<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Resensi Buku</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .view-section { display: none; }
        .active-view { display: block; }
        .clickable-title { color: #0d6efd; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div id="header" class="d-flex justify-content-between align-items-center mb-4" style="display: none !important;">
        <h2 id="welcome-text">Dashboard</h2>
        <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
    </div>

    <div id="view-auth" class="view-section active-view card p-4 mx-auto" style="max-width: 500px;">
        <h3 class="text-center mb-4" id="auth-title">Login</h3>
        <form id="authForm">
            <div id="register-fields" style="display: none;">
                <input type="text" id="reg-name" class="form-control mb-3" placeholder="Nama Lengkap">
                <input type="date" id="reg-birth" class="form-control mb-3" title="Tanggal Lahir">
            </div>
            <input type="email" id="auth-email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" id="auth-password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100" id="auth-btn">Login</button>
        </form>
        <div class="mt-3 text-center">
            <a href="#" onclick="toggleAuthMode()" id="auth-toggle-link">Belum punya akun? Register di sini</a>
        </div>
    </div>

    <div id="view-dashboard" class="view-section">
        <button class="btn btn-success mb-4" onclick="showForm()">Create New Review</button>
        <div class="row" id="reviews-container"></div>
    </div>

    <div id="view-form" class="view-section card p-4">
        <h3 id="form-title">Buat Resensi Baru</h3>
        <form id="reviewForm">
            <input type="hidden" id="edit-id">
            <div class="row">
                <div class="col-md-6 mb-3"><input type="text" id="title" class="form-control" placeholder="Judul Buku" required></div>
                <div class="col-md-6 mb-3"><input type="text" id="author" class="form-control" placeholder="Nama Penulis" required></div>
                <div class="col-md-6 mb-3"><input type="number" id="year" class="form-control" placeholder="Tahun Terbit" required></div>
                <div class="col-md-6 mb-3"><input type="text" id="genre" class="form-control" placeholder="Genre Buku"></div>
                <div class="col-12 mb-3"><input type="file" id="image" class="form-control" accept="image/*"></div>
                <div class="col-12 mb-3"><textarea id="desc" class="form-control" rows="5" placeholder="Tulis deskripsi review buku di sini..." required></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="button" class="btn btn-secondary" onclick="showDashboard()">Batal</button>
        </form>
    </div>

    <div id="view-preview" class="view-section card p-4">
        <button class="btn btn-sm btn-outline-secondary mb-3" onclick="showDashboard()" style="width: max-content;">&larr; Kembali</button>
        <div class="row">
            <div class="col-md-4"><img id="prev-img" class="img-fluid rounded"></div>
            <div class="col-md-8">
                <h2 id="prev-title"></h2>
                <h5 class="text-muted"><span id="prev-author"></span> - <span id="prev-year"></span></h5>
                <span class="badge bg-info mb-3" id="prev-genre"></span>
                <p id="prev-desc" style="white-space: pre-wrap;"></p>
                <hr>
                <button class="btn btn-warning" id="btn-edit" onclick="editReview()">Edit</button>
                <button class="btn btn-danger" id="btn-delete" onclick="deleteReview()">Delete</button>
            </div>
        </div>
    </div>

</div>

<script>
    const API_URL = 'http://192.168.50.9:8080/api'; // PASTIKAN IP INI BENAR
    let isRegisterMode = false;
    let currentReviews = [];
    let currentPreviewId = null;

    // --- UTILS ---
    function switchView(viewId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
        document.getElementById(viewId).classList.add('active-view');
        
        const header = document.getElementById('header');
        if(viewId === 'view-auth') header.style.setProperty('display', 'none', 'important');
        else header.style.setProperty('display', 'flex', 'important');
    }
    
    function getToken() { return localStorage.getItem('token'); }
    function authHeaders() { return { 'Authorization': `Bearer ${getToken()}` }; }

    // --- AUTH LOGIC ---
    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? 'Register User' : 'Login';
        document.getElementById('auth-btn').innerText = isRegisterMode ? 'Register' : 'Login';
        document.getElementById('auth-toggle-link').innerText = isRegisterMode ? 'Sudah punya akun? Login' : 'Belum punya akun? Register di sini';
        document.getElementById('register-fields').style.display = isRegisterMode ? 'block' : 'none';
        
        document.getElementById('reg-name').required = isRegisterMode;
        document.getElementById('reg-birth').required = isRegisterMode;
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;

        // Ubah tombol jadi loading agar user tahu sedang proses
        const btn = document.getElementById('auth-btn');
        const originalText = btn.innerText;
        btn.innerText = 'Loading...';
        btn.disabled = true;

        try {
            if (isRegisterMode) {
                const name = document.getElementById('reg-name').value;
                const birth_date = document.getElementById('reg-birth').value;
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, birth_date })
                });
                
                if (res.ok) { 
                    alert('Register berhasil! Silakan login.'); 
                    toggleAuthMode(); 
                } else { 
                    // Tangkap error dengan lebih aman (bisa JSON atau teks biasa)
                    const errText = await res.text();
                    try {
                        const errJson = JSON.parse(errText);
                        alert('Gagal Register: ' + (errJson.error || 'Kesalahan tidak diketahui'));
                    } catch(jsonErr) {
                        alert('Error Server (Cek Terminal backend): ' + errText);
                    }
                }
            } else {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.token);
                    document.getElementById('welcome-text').innerText = `Dashboard - Halo, ${data.user.name}`;
                    showDashboard();
                } else { 
                    alert('Login gagal. Pastikan email dan password benar.'); 
                }
            }
        } catch (error) {
            alert('Gagal menghubungi server! Pastikan API Gateway berjalan dan IP sudah benar.');
            console.error("Network/Fetch Error:", error);
        } finally {
            // Kembalikan tombol seperti semula
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });

    function logout() {
        localStorage.removeItem('token');
        document.getElementById('authForm').reset();
        switchView('view-auth');
    }




    // --- DASHBOARD LOGIC ---
    async function showDashboard() {
        if (!getToken()) return switchView('view-auth');
        switchView('view-dashboard');
        
        const res = await fetch(`${API_URL}/reviews`, { headers: authHeaders() });
        if(res.status === 401) return logout();
        
        currentReviews = await res.json();
        const container = document.getElementById('reviews-container');
        container.innerHTML = '';

        if(currentReviews.length === 0) { container.innerHTML = '<p class="text-muted">Belum ada resensi.</p>'; return; }

        currentReviews.forEach(rev => {
            container.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <img src="${rev.image_url}" class="card-img-top" style="height: 200px; object-fit: cover;">
                        <div class="card-body">
                            <h5 class="card-title clickable-title" onclick="showPreview(${rev.id})">${rev.book_title}</h5>
                            <h6 class="card-subtitle mb-2 text-muted">${rev.book_author} (${rev.publish_year})</h6>
                        </div>
                    </div>
                </div>`;
        });
    }

    // --- CRUD RESENSI LOGIC ---
    function showForm(isEdit = false, revData = null) {
        switchView('view-form');
        const form = document.getElementById('reviewForm');
        form.reset();
        document.getElementById('edit-id').value = '';
        
        if (isEdit && revData) {
            document.getElementById('form-title').innerText = 'Edit Resensi';
            document.getElementById('edit-id').value = revData.id;
            document.getElementById('title').value = revData.book_title;
            document.getElementById('author').value = revData.book_author;
            document.getElementById('year').value = revData.publish_year;
            document.getElementById('genre').value = revData.book_genre;
            document.getElementById('desc').value = revData.review_text;
            document.getElementById('image').required = false; // Foto tidak wajib saat edit
        } else {
            document.getElementById('form-title').innerText = 'Buat Resensi Baru';
            document.getElementById('image').required = true; // Foto wajib saat create baru
        }
    }

    document.getElementById('reviewForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const editId = document.getElementById('edit-id').value;
        const formData = new FormData();
        formData.append('book_title', document.getElementById('title').value);
        formData.append('book_author', document.getElementById('author').value);
        formData.append('publish_year', document.getElementById('year').value);
        formData.append('book_genre', document.getElementById('genre').value);
        formData.append('review_text', document.getElementById('desc').value);
        
        const imageFile = document.getElementById('image').files[0];
        if(imageFile) formData.append('image', imageFile);

        const url = editId ? `${API_URL}/reviews/${editId}` : `${API_URL}/reviews`;
        const method = editId ? 'PUT' : 'POST';

        const res = await fetch(url, { method: method, headers: authHeaders(), body: formData });
        
        if (res.ok) {
            alert(editId ? 'Resensi Berhasil Diupdate' : 'Resensi Baru Berhasil Dibuat');
            if(editId) {
                await showDashboard(); // Refresh data dulu
                showPreview(editId); // Kembali ke preview
            } else {
                showDashboard();
            }
        } else {
            const err = await res.json(); alert('Error: ' + err.error);
        }
    });

    function showPreview(id) {
        currentPreviewId = id;
        const rev = currentReviews.find(r => r.id == id);
        if(!rev) return;

        document.getElementById('prev-img').src = rev.image_url;
        document.getElementById('prev-title').innerText = rev.book_title;
        document.getElementById('prev-author').innerText = rev.book_author;
        document.getElementById('prev-year').innerText = rev.publish_year;
        document.getElementById('prev-genre').innerText = rev.book_genre;
        document.getElementById('prev-desc').innerText = rev.review_text;

        switchView('view-preview');
    }

    function editReview() {
        const rev = currentReviews.find(r => r.id == currentPreviewId);
        if(rev) showForm(true, rev);
    }

    async function deleteReview() {
        if (confirm('Yakin ingin Menghapus?')) {
            const res = await fetch(`${API_URL}/reviews/${currentPreviewId}`, { method: 'DELETE', headers: authHeaders() });
            if (res.ok) {
                alert('Resensi Berhasil Dihapus');
                showDashboard();
            } else { alert('Gagal menghapus'); }
        }
    }

    // Init
    if (getToken()) showDashboard();
    else switchView('view-auth');

</script>
</body>
</html>
